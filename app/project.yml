# XcodeGen spec — regenerate with: cd app && xcodegen generate
# One project, one bundle-ID family, two targets (CLAUDE.md §7).
name: TutorBank
options:
  bundleIdPrefix: com.pr3n3v
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # DEVELOPMENT_TEAM is set per-machine in Xcode (free provisioning, CLAUDE.md §1)
targets:
  TutorBank:
    type: application
    platform: iOS
    sources:
      - TutorBank
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pr3n3v.tutorbank
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: TutorBank
    dependencies:
      - target: TutorBankWatch
  TutorBankWatch:
    type: application
    platform: watchOS
    sources:
      - TutorBankWatch
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pr3n3v.tutorbank.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: StudyTimer
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.pr3n3v.tutorbank
  TutorBankWatchUITests:
    type: bundle.ui-testing
    platform: watchOS
    sources:
      - TutorBankWatchUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pr3n3v.tutorbank.watchkitapp.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TutorBankWatch
